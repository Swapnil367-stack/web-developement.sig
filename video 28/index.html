<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css positioning</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        
        .box1,.box2,.box3,.box4{
            position: relative;
            top: 20px;
            bottom: 56px;
            height: 100px;
            width: 90vw;
            border: 2px solid black;
            padding: 3px;
            margin: 10px auto;
            background-color: lightblue;
            

        }

        .box2{
           
            background-color: lightgreen;
            
           
        }

        .box3{
           
            background-color: lightcoral;
        }

        .box4{
           
            background-color: lightsalmon;
        }
        

    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
   
    
</body>
</html>
