<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> css Box </title>
    <style>
        *{
            margin: 10px;
            padding: 50px;
            width: 700px;
            height: 200px;
            border: 2px;
            box-sizing: border-box;

        }
        .box{
            background-color: aqua;
        }
        .box1{
            color: red;
            padding: 10px; 
            margin: 5px;
            border: 2px solid blue;
        }
        .box2{
            color: blue;
            padding:10px;
            margin: 5px;
            border: 2px solid black;
        }
        .box3{
            color: blueviolet;
            padding: 50px;
            margin: 10px;
            width: 300px;
            height: 400px;
            border: 2px solid black ;
            box-sizing: border-box;
        }
    </style>

</head>
<body>
    <div class=" box box1"> I am Box </div>
    <div class=" box box2"> I am another Box</div>
    <div class="box box3"> Hallo ! everyone. My name is swapnil. 
        <p>
            I don't know what am I actual thinking.

        </p>
    </div>
     
</body>
</html>
