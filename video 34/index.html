<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex box</title>
    <style>
        .flex-container{
            display: flex;
            background-color:rgb(131, 131, 205) ;
            flex-direction: row;

        }
        .flex-container div{
            background-color: aqua;
            margin: 10px;
            padding: 15px;
        }

    </style>
</head>
<body>
    <h2>flex box-container direction</h2>
   <div class="flex-container">
        <div>one </div>
        <div> two</div>
        <div>Three</div>
    </div>   
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex wrap container'</title>
    <style>
        .flex-container{
            background-color:pink ;
            display: flex;
             flex-wrap: wrap;

        }
        .flex-container div{
           
            background-color: aqua;
            margin: 5px;
            padding: 10px;
        }


    </style>
</head>
<body>
    <h3>Flex wrap container</h3>
    <div class="flex-container">
        <div>one</div><div>two</div><div>Three</div>
        <div>four</div><div>five </div>
    </div>
    
</body>
</html>
