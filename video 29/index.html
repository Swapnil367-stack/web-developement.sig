<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise number 3</title>
    <style>
        body {
            background-color: gray;
        }

        .card {
            background-color: rgb(250, 250, 250);
            height: 160px;
            width: 100px;
            border-radius: 5px;
            position: relative;
            top: 12px;
            right: 10px;
            left: 10px;
        }

        .image {
            padding: 3px;
            margin: 0px;


        }

        .image img {
            border-radius: 5px;

        }

        span {
            display: inline-block;
            background-color: white;
            border: 1px solid rgb(227, 227, 227);
            padding: 2px;
            border-radius: 25px;
            font-size: 5px;
            position: relative;
            top: -10px;
            bottom: 5px;
            margin-top: 10px;
            margin-bottom: 10px;
            cursor: pointer;

        }
    


        h1 {
            font-size: small;
            position: relative;
            top: -24px;
        }

        p{
            font-size: 5px;
            position: relative;
            top: -28px;
        }
        .readmore{
            position: relative;
            top: -36px;
            font-size: 6px;
            left: 27px;
            right: 7px;
            padding: 3px;
            border-radius: 10px;
            background-color: rgb(186, 190, 224);
            font-style: rgb(61, 61, 154);
       
        }
    </style>

</head>

<body>

    <div class="card">
        <div class="image">
            <img width="94px" height="60px" src="https://jooinn.com/images1280_/old-man-in-the-boat.jpg" alt="">
            <span>Nature</span>
            <span>Lake</span>
            
            <h1>Lago di Brais</h1>
            <p>Arrive at the lake a little before the calculated sunset time to ensure you have enough time to find a
                good spot, set up any equipment, and settle in for the view. You may want to bring a blanket, some snacks,
                and camera to capture the moment.</p>
                <span class="readmore">Read More</span>
               
    </div>



</body>

</html>
